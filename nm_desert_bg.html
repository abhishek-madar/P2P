<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:600px;overflow:hidden}

#scene{position:relative;width:100%;height:600px;overflow:hidden}

#sky{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,
    #0a0510 0%,#1a0a2e 18%,#2d1454 32%,
    #c4420a 52%,#e8720d 62%,#f0a030 72%,
    #f5c060 80%,#e8d090 88%,#d4b870 100%
  );
}

.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:.9}50%{opacity:.15}}

#sun-glow{
  position:absolute;bottom:38%;left:50%;transform:translateX(-50%);
  width:520px;height:170px;
  background:radial-gradient(ellipse at center bottom,rgba(255,160,30,.75) 0%,rgba(255,80,0,.3) 40%,transparent 72%);
  pointer-events:none;
}

#mountains-far{position:absolute;bottom:33%;width:100%;height:120px}
#mountains-far svg{width:100%;height:100%}

#mountains-mid{position:absolute;bottom:31%;width:100%;height:100px}
#mountains-mid svg{width:100%;height:100%}

#ground{
  position:absolute;bottom:0;left:0;right:0;height:36%;
  background:linear-gradient(to bottom,#c8860a 0%,#b5720a 15%,#9a5e08 40%,#7a4606 70%,#5c3204 100%);
}
#ground::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(90deg,transparent 0,transparent 18px,rgba(0,0,0,.06) 18px,rgba(0,0,0,.06) 19px),
    repeating-linear-gradient(0deg,transparent 0,transparent 8px,rgba(0,0,0,.04) 8px,rgba(0,0,0,.04) 9px);
}

#road{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:160px;height:36%;
  background:linear-gradient(to bottom,#8a6a30 0%,#6b5020 50%,#4a3810 100%);
  clip-path:polygon(30% 0%,70% 0%,100% 100%,0% 100%);
}

#powerlines{position:absolute;bottom:33%;left:0;right:0;height:80px;pointer-events:none}
#powerlines svg{width:100%;height:100%}

#shimmer{
  position:absolute;bottom:33%;left:0;right:0;height:14px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,160,40,.18) 20%,transparent 40%,rgba(255,160,40,.14) 60%,transparent 80%,rgba(255,160,40,.1) 100%);
  animation:shimmerWave 3s ease-in-out infinite;pointer-events:none;
}
@keyframes shimmerWave{0%,100%{opacity:.5;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.8)}}

.scrub{position:absolute;bottom:33.5%}
.cactus{position:absolute;bottom:33.5%}

.dust{position:absolute;border-radius:50%;background:rgba(180,120,40,.4);animation:dustFloat linear infinite;pointer-events:none}
@keyframes dustFloat{0%{transform:translate(0,0) scale(1);opacity:0}20%{opacity:.6}100%{transform:translate(var(--dx),var(--dy)) scale(.3);opacity:0}}

#vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,.7) 100%);
  pointer-events:none;z-index:10;
}
</style>
</head>
<body>
<div id="scene">
  <div id="sky"></div>
  <div id="stars"></div>
  <div id="sun-glow"></div>

  <div id="mountains-far">
    <svg viewBox="0 0 1000 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="mfg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6b3a18" stop-opacity=".7"/>
          <stop offset="100%" stop-color="#4a2810" stop-opacity=".9"/>
        </linearGradient>
      </defs>
      <polygon fill="url(#mfg)" points="0,120 0,80 60,40 120,70 180,30 250,60 310,20 380,55 440,15 500,45 560,10 630,50 690,25 760,60 820,30 880,65 940,35 1000,55 1000,120"/>
    </svg>
  </div>

  <div id="mountains-mid">
    <svg viewBox="0 0 1000 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="mmg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7a3d14"/>
          <stop offset="100%" stop-color="#5a2c0c"/>
        </linearGradient>
      </defs>
      <polygon fill="url(#mmg)" points="0,100 0,65 80,50 150,70 210,40 290,68 370,35 450,60 510,28 580,55 650,20 730,58 800,38 870,62 930,42 1000,58 1000,100"/>
    </svg>
  </div>

  <div id="ground"></div>
  <div id="road"></div>

  <div id="powerlines">
    <svg viewBox="0 0 1000 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="80" y1="0" x2="80" y2="80" stroke="#3a2810" stroke-width="2.5" opacity=".7"/>
      <line x1="280" y1="0" x2="280" y2="80" stroke="#3a2810" stroke-width="2.5" opacity=".7"/>
      <line x1="720" y1="0" x2="720" y2="80" stroke="#3a2810" stroke-width="2.5" opacity=".7"/>
      <line x1="920" y1="0" x2="920" y2="80" stroke="#3a2810" stroke-width="2.5" opacity=".7"/>
      <line x1="60" y1="15" x2="100" y2="15" stroke="#3a2810" stroke-width="2" opacity=".7"/>
      <line x1="260" y1="15" x2="300" y2="15" stroke="#3a2810" stroke-width="2" opacity=".7"/>
      <line x1="700" y1="15" x2="740" y2="15" stroke="#3a2810" stroke-width="2" opacity=".7"/>
      <line x1="900" y1="15" x2="940" y2="15" stroke="#3a2810" stroke-width="2" opacity=".7"/>
      <path d="M65,15 Q180,25 265,15" stroke="#2a1a08" stroke-width="1.2" fill="none" opacity=".6"/>
      <path d="M295,15 Q510,30 705,15" stroke="#2a1a08" stroke-width="1.2" fill="none" opacity=".6"/>
      <path d="M735,15 Q828,22 905,15" stroke="#2a1a08" stroke-width="1.2" fill="none" opacity=".6"/>
      <path d="M75,17 Q180,28 275,17" stroke="#2a1a08" stroke-width="1.2" fill="none" opacity=".5"/>
      <path d="M285,17 Q510,33 715,17" stroke="#2a1a08" stroke-width="1.2" fill="none" opacity=".5"/>
      <path d="M725,17 Q828,25 915,17" stroke="#2a1a08" stroke-width="1.2" fill="none" opacity=".5"/>
    </svg>
  </div>

  <div id="shimmer"></div>

  <!-- Scrub brushes -->
  <div class="scrub" style="left:7%">
    <svg width="62" height="30" viewBox="0 0 62 30">
      <ellipse cx="31" cy="21" rx="29" ry="10" fill="#5a3a08" opacity=".8"/>
      <ellipse cx="16" cy="17" rx="14" ry="8" fill="#6b4510" opacity=".9"/>
      <ellipse cx="46" cy="16" rx="16" ry="7" fill="#634010" opacity=".9"/>
      <ellipse cx="31" cy="13" rx="19" ry="11" fill="#7a5018" opacity=".8"/>
      <rect x="28" y="21" width="6" height="9" fill="#4a2c08"/>
    </svg>
  </div>
  <div class="scrub" style="right:9%">
    <svg width="52" height="26" viewBox="0 0 52 26">
      <ellipse cx="26" cy="18" rx="23" ry="9" fill="#5a3a08" opacity=".8"/>
      <ellipse cx="13" cy="14" rx="12" ry="7" fill="#6b4510" opacity=".9"/>
      <ellipse cx="39" cy="14" rx="14" ry="6" fill="#634010" opacity=".9"/>
      <ellipse cx="26" cy="11" rx="16" ry="9" fill="#7a5018" opacity=".8"/>
      <rect x="23" y="18" width="5" height="8" fill="#4a2c08"/>
    </svg>
  </div>
  <div class="scrub" style="left:23%">
    <svg width="38" height="22" viewBox="0 0 38 22">
      <ellipse cx="19" cy="15" rx="17" ry="7" fill="#5a3a08" opacity=".75"/>
      <ellipse cx="19" cy="10" rx="12" ry="8" fill="#6b4510" opacity=".8"/>
      <rect x="17" y="15" width="4" height="7" fill="#4a2c08"/>
    </svg>
  </div>
  <div class="scrub" style="right:21%">
    <svg width="44" height="24" viewBox="0 0 44 24">
      <ellipse cx="22" cy="16" rx="20" ry="8" fill="#5a3a08" opacity=".75"/>
      <ellipse cx="22" cy="11" rx="14" ry="9" fill="#6b4510" opacity=".8"/>
      <rect x="19" y="16" width="5" height="8" fill="#4a2c08"/>
    </svg>
  </div>
  <div class="scrub" style="left:42%;bottom:34%">
    <svg width="28" height="16" viewBox="0 0 28 16">
      <ellipse cx="14" cy="11" rx="12" ry="5" fill="#5a3a08" opacity=".7"/>
      <ellipse cx="14" cy="7" rx="8" ry="6" fill="#6b4510" opacity=".75"/>
      <rect x="12" y="11" width="3" height="5" fill="#4a2c08"/>
    </svg>
  </div>

  <!-- Cacti -->
  <div class="cactus" style="left:3%">
    <svg width="38" height="84" viewBox="0 0 38 84">
      <rect x="15" y="12" width="8" height="72" rx="4" fill="#2d5a1a" opacity=".9"/>
      <rect x="5" y="32" width="22" height="7" rx="3.5" fill="#2d5a1a" opacity=".9"/>
      <rect x="5" y="18" width="8" height="22" rx="4" fill="#2d5a1a" opacity=".9"/>
      <rect x="25" y="24" width="8" height="20" rx="4" fill="#2d5a1a" opacity=".9"/>
      <rect x="15" y="8" width="8" height="8" rx="4" fill="#1a3a0a" opacity=".9"/>
    </svg>
  </div>
  <div class="cactus" style="right:4%">
    <svg width="30" height="64" viewBox="0 0 30 64">
      <rect x="11" y="10" width="8" height="54" rx="4" fill="#2d5a1a" opacity=".85"/>
      <rect x="3" y="24" width="18" height="6" rx="3" fill="#2d5a1a" opacity=".85"/>
      <rect x="3" y="14" width="6" height="18" rx="3" fill="#2d5a1a" opacity=".85"/>
      <rect x="21" y="20" width="6" height="16" rx="3" fill="#2d5a1a" opacity=".85"/>
    </svg>
  </div>
  <div class="cactus" style="left:16%;bottom:33.5%">
    <svg width="22" height="50" viewBox="0 0 22 50">
      <rect x="8" y="8" width="6" height="42" rx="3" fill="#2d5a1a" opacity=".8"/>
      <rect x="2" y="18" width="14" height="5" rx="2.5" fill="#2d5a1a" opacity=".8"/>
      <rect x="2" y="11" width="5" height="14" rx="2.5" fill="#2d5a1a" opacity=".8"/>
    </svg>
  </div>

  <div id="dust-container"></div>
  <div id="vignette"></div>
</div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for(let i=0;i<90;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2.5+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*42}%;animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*4}s;opacity:${Math.random()*.7+.2};`;
  starsEl.appendChild(s);
}

// Dust
const dustC=document.getElementById('dust-container');
function spawnDust(){
  const p=document.createElement('div');
  p.className='dust';
  const sz=Math.random()*6+2;
  p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${33+Math.random()*3}%;--dx:${(Math.random()-.5)*90}px;--dy:${-Math.random()*50-10}px;animation-duration:${Math.random()*5+3}s;animation-delay:${Math.random()*2}s;`;
  dustC.appendChild(p);
  setTimeout(()=>p.remove(),7000);
}
setInterval(spawnDust,280);
</script>
</body>
</html>
