
<style>
  canvas { display: block; width: 100%; height: 520px; background: #080b12; border-radius: 10px; }
  #controls { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; padding: 10px 0 4px; }
  #controls label { font-size: 13px; color: var(--color-text-secondary); display: flex; align-items: center; gap: 8px; }
  #controls span { font-size: 13px; font-weight: 500; min-width: 28px; color: var(--color-text-primary); }
</style>

<canvas id="c"></canvas>
<div id="controls">
  <label>Nodes <input type="range" min="30" max="120" value="65" id="nCount" step="1"> <span id="nVal">65</span></label>
  <label>Reach <input type="range" min="80" max="260" value="155" id="reach" step="1"> <span id="rVal">155</span></label>
  <label>Speed <input type="range" min="1" max="10" value="3" id="spd" step="1"> <span id="sVal">3</span></label>
  <label>Pulse <input type="range" min="0" max="10" value="4" id="pulse" step="1"> <span id="pVal">4</span></label>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, nodes = [], mouse = {x: -9999, y: -9999};
let nCount = 65, reach = 155, spd = 3, pulseInt = 4;

const PALETTE = {
  nodePrimary:  '#4af3d3',
  nodeSecondary:'#a78bfa',
  nodeAccent:   '#f472b6',
  edgePrimary:  '#4af3d3',
  edgeSecondary:'#a78bfa',
  glow:         '#4af3d3',
  pulse:        '#f472b6',
  bg:           '#080b12',
};

function resize() {
  const rect = canvas.getBoundingClientRect();
  W = canvas.width  = Math.round(rect.width);
  H = canvas.height = Math.round(rect.height);
}

function mkNode() {
  const colorRoll = Math.random();
  const col = colorRoll < 0.6 ? PALETTE.nodePrimary
             : colorRoll < 0.85 ? PALETTE.nodeSecondary
             : PALETTE.nodeAccent;
  const speed = (0.2 + Math.random() * 0.8) * (spd / 3);
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * speed,
    vy: (Math.random() - 0.5) * speed,
    r: 1.5 + Math.random() * 2.5,
    col,
    pulseT: Math.random() * Math.PI * 2,
    isPulseOrigin: Math.random() < 0.08,
    pulseRadius: 0,
    pulseAlpha: 0,
  };
}

function initNodes() {
  nodes = [];
  for (let i = 0; i < nCount; i++) nodes.push(mkNode());
}

function update() {
  nodes.forEach(n => {
    n.x += n.vx;
    n.y += n.vy;
    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;
    n.pulseT += 0.018;

    if (n.isPulseOrigin && pulseInt > 0) {
      if (Math.random() < 0.003 * pulseInt) {
        n.pulseRadius = 0;
        n.pulseAlpha = 0.7;
      }
      if (n.pulseAlpha > 0) {
        n.pulseRadius += 1.8;
        n.pulseAlpha -= 0.012;
      }
    }
  });
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16),
        g = parseInt(hex.slice(3,5),16),
        b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}

function draw() {
  ctx.fillStyle = PALETTE.bg;
  ctx.fillRect(0,0,W,H);

  // Mouse proximity nodes
  const mouseInfluence = 180;

  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    for (let j = i+1; j < nodes.length; j++) {
      const b = nodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > reach) continue;

      const t = 1 - dist / reach;
      const edgeCol = (a.col === PALETTE.nodeSecondary || b.col === PALETTE.nodeSecondary)
                      ? PALETTE.edgeSecondary : PALETTE.edgePrimary;

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = hexAlpha(edgeCol, t * 0.45);
      ctx.lineWidth = 0.6 + t * 0.8;
      ctx.stroke();

      // Highlight edges near mouse
      const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
      const md = Math.hypot(mx - mouse.x, my - mouse.y);
      if (md < mouseInfluence) {
        const mt = 1 - md / mouseInfluence;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = hexAlpha(PALETTE.pulse, mt * 0.6 * t);
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }
    }
  }

  // Pulse rings
  nodes.forEach(n => {
    if (n.isPulseOrigin && n.pulseAlpha > 0 && pulseInt > 0) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.pulseRadius, 0, Math.PI * 2);
      ctx.strokeStyle = hexAlpha(PALETTE.pulse, n.pulseAlpha);
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  });

  // Nodes
  nodes.forEach(n => {
    const breathe = 0.8 + 0.2 * Math.sin(n.pulseT);
    const r = n.r * breathe;

    // Glow halo
    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 4, 0, Math.PI * 2);
    ctx.fillStyle = hexAlpha(n.col, 0.10);
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = hexAlpha(n.col, 0.85);
    ctx.fill();

    // Highlight cap
    ctx.beginPath();
    ctx.arc(n.x, n.y, r * 0.42, 0, Math.PI * 2);
    ctx.fillStyle = hexAlpha('#ffffff', 0.35);
    ctx.fill();

    // Mouse proximity glow
    const md = Math.hypot(n.x - mouse.x, n.y - mouse.y);
    if (md < mouseInfluence) {
      const mt = 1 - md / mouseInfluence;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 8 * mt, 0, Math.PI * 2);
      ctx.fillStyle = hexAlpha(PALETTE.pulse, 0.18 * mt);
      ctx.fill();
    }
  });
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function bindControl(id, valId, callback) {
  const el = document.getElementById(id);
  const out = document.getElementById(valId);
  el.addEventListener('input', () => {
    out.textContent = el.value;
    callback(Number(el.value));
  });
}

bindControl('nCount','nVal', v => { nCount = v; initNodes(); });
bindControl('reach',  'rVal', v => { reach = v; });
bindControl('spd',    'sVal', v => {
  spd = v;
  nodes.forEach(n => {
    const speed = (0.2 + Math.random() * 0.8) * (spd / 3);
    n.vx = (Math.random() - 0.5) * speed;
    n.vy = (Math.random() - 0.5) * speed;
  });
});
bindControl('pulse', 'pVal', v => { pulseInt = v; });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});
canvas.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const cx = e.clientX - r.left, cy = e.clientY - r.top;
  const n = mkNode();
  n.x = cx; n.y = cy;
  n.isPulseOrigin = true;
  n.pulseRadius = 0; n.pulseAlpha = 1;
  nodes.push(n);
  if (nodes.length > nCount + 20) nodes.splice(0, 1);
});

window.addEventListener('resize', () => { resize(); initNodes(); });
resize();
initNodes();
loop();
</script>
